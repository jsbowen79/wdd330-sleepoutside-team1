<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Home</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script type="module" src="js/main.js"></script>
  </head>

  <body>
    <header class="divider" id="mainHeader"></header>
    <main class="divider">
      <div class="hero">
        <img
          src="/images/banner-sm.jpg"
          srcset="images/banner-sm.jpg 500w, images/banner.jpg"
          alt="image of a high mountain lake"
        />
        <div class="logo logo--square">
          <img src="/images/noun_Tent_2517.svg" alt="tent image for logo" />
          <div>Sleep<span class="highlight">Outside</span></div>
        </div>
        <div class="mission">
          <p>
            Our mission is to provide you with everything you need to sleep
            outside comfortably at an affordable price.
          </p>
        </div>
      </div>
      <div class="products">
        <ul class="category-grid">
          <li>
            <a href="product-listing/search/?category=tents"
              ><img
                src="/images/category-tents.svg"
                alt="Tent image for category"
            /></a>
            <h2>Tents</h2>
          </li>
          <li>
            <a href="product-listing/search/?category=backpacks"
              ><img
                src="/images/category-backpacks.svg"
                alt="Backpack image for category"
            /></a>
            <h2>Backpacks</h2>
          </li>
          <li>
            <a href="product-listing/search/?category=sleepingbags"
              ><img
                src="/images/category-sleepingbags.svg"
                alt="Sleeping bag image for category"
            /></a>
            <h2>Sleeping Bags</h2>
          </li>
          <li>
            <a href="product-listing/search/?category=hammocks"
              ><img
                src="/images/category-hammocks.svg"
                alt="Hammock image for category"
            /></a>
            <h2>Hammocks</h2>
          </li>
        </ul>
      </div>

      <section class="products">
        <h2>Top Products</h2>
        <ul class="product-list"></ul>
      </section>
    </main>
    <footer id="mainFooter"></footer>
  </body>
</html>
