<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Home</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script type="module" src="js/main.js"></script>
  </head>

  <body>
    <header class="divider" id="mainHeader"></header>
    <main class="divider">
      <div class="hero">
        <img
          src="/images/banner-sm.jpg"
          srcset="images/banner-sm.jpg 500w, images/banner.jpg"
          alt="image of a high mountain lake"
        />
        <div class="logo logo--square">
          <img src="/images/noun_Tent_2517.svg" alt="tent image for logo" />
          <div>Sleep<span class="highlight">Outside</span></div>
        </div>
        <div class="mission">
          <p>
            Our mission is to provide you with everything you need to sleep
            outside comfortably at an affordable price.
          </p>
        </div>
      </div>
      <div class="category">
        <a href="/product_listing/index.html?category=backpacks" class="category_icon" id="backpack_category"><img
            src="/images/categories/category-backpacks.svg" alt="A backpack icon"></a>
        <a href="/product_listing/index.html?category=hammocks" class="category_icon" id="hammock_category"><img
            src="/images/categories/category-hammocks.svg" alt="A hammock icon"></a>
        <a href="/product_listing/index.html?category=sleeping-bags" class="category_icon" id="sleeping_bag_category"><img
            src="/images/categories/category-sleepingbags.svg" alt="A sleeping bag icon"></a>
        <a href="/product_listing/index.html?category=tents" class="category_icon" id="tent_category"><img
            src="/images/categories/category-tents.svg" alt="A tent icon"></a>
      </div>
      <section class="products">
       
        <ul class="product-list"></ul>
      </section>
    </main>
    <footer id="mainFooter"></footer>
  </body>
</html>
