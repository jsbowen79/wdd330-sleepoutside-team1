<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Cart</title>

    <link rel="stylesheet" href="/css/style.css" />

    <script src="../js/cart.js" type="module"></script>
  </head>

  <body>
    <header class="divider" id="mainHeader"></header>

    <main class="divider">
      <section id="products">
        <table>
          <caption>
            My Shopping Cart
          </caption>
          <thead>
            <tr>
              <th id="cartImage">Image</th>
              <th id="cartName">Name</th>
              <th id="cartColor">Color</th>
              <th id="cartQuantity">Quantity</th>
              <th id="cartPrice">Price</th>
              <th id="cartDelete">Delete</th>
            </tr>
          </thead>
          <tbody class="cartTBody"></tbody>
        </table>

        <div class="cart-footer"></div>
      </section>
    </main>

    <footer id="mainFooter"></footer>
  </body>
</html>
